name: Détection leads — prises de poste

on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  run-routine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests google-auth google-auth-httplib2 google-api-python-client
      - run: python main.py
        env:
          PHANTOM_API_KEY: ${{ secrets.PHANTOM_API_KEY }}
          PHANTOM_AGENT_ID: ${{ secrets.PHANTOM_AGENT_ID }}
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
